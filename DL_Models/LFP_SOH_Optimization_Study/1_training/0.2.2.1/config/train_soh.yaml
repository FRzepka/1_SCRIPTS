# 0.2.2.1 SOH TCN - HOURLY AGGREGATION + STATS (SEQ2SEQ)
# Changes from 0.2.1.8:
# - Larger receptive field for long-term SOH trends
# - More training windows (smaller stride)
# - Stronger smoothness loss
# - Target uses mean-of-hour to reduce noise

seed: 42

paths:
  data_root: ${DATA_ROOT:-/home/florianr/MG_Farm/0_Data/MGFarm_18650_FE}
  out_root: ${OUT_ROOT:-/home/florianr/MG_Farm/1_Scripts/DL_Models/LFP_SOH_Optimization_Study/1_training/0.2.2.1/outputs/soh}

model:
  type: Causal_TCN_Seq2Seq
  # Base features; hourly aggregation expands to {feature}_{mean,std,min,max}
  features: ["Voltage[V]", "Current[A]", "Temperature[°C]", "EFC", "Q_c"]
  hidden_size: 96
  mlp_hidden: 96
  num_layers: 4
  kernel_size: 3
  dilations: [1, 2, 4, 8, 16]
  dropout: 0.05

training:
  target: SOH
  seq_chunk_size: 168        # hours per sequence (≈ 1 week)
  loss_mode: seq2seq         # seq2seq (all steps) or last (only last step)
  warmup_steps: -1           # auto = receptive_field - 1
  smooth_loss_weight: 0.3    # penalty on |y_t - y_{t-1}|
  smooth_loss_type: l1       # l1 or l2
  lr: 0.0002
  weight_decay: 0.0001
  max_grad_norm: 1.0
  epochs: 150
  val_interval: 3            # More frequent validation
  early_stopping: 25
  batch_size: 256            # smaller seq_len allows bigger batch
  accum_steps: 1
  window_stride: 1           # more windows for stability
  scheduler:
    type: cosine_warm_restarts
    T_0: 150
    T_mult: 1
    eta_min_factor: 0.05
  compile: false

sampling:
  enabled: true
  interval_seconds: 3600
  feature_aggs: ["mean", "std", "min", "max"]
  target_agg: "mean"

cells:
  train: ["MGFarm_18650_C01", "MGFarm_18650_C03", "MGFarm_18650_C05", "MGFarm_18650_C09", "MGFarm_18650_C13", "MGFarm_18650_C17", "MGFarm_18650_C25", "MGFarm_18650_C27", "MGFarm_18650_C29"]
  val:   ["MGFarm_18650_C07", "MGFarm_18650_C15", "MGFarm_18650_C21"]
  test:  ["MGFarm_18650_C11", "MGFarm_18650_C19", "MGFarm_18650_C23"]

export:
  save_best_only: false
  save_every_n: 15
  to_onnx: true
  onnx_opset: 17
  stateful_onnx: true

tracking:
  csv_log: true
  csv_file: ${OUT_ROOT:-outputs/soh}/training_log.csv
  tensorboard: false

performance:
  deterministic: false
  cudnn_benchmark: true
  allow_tf32: true
  matmul_precision: high
  compile: false

metrics:
  primary: rmse
  secondary: ["mae", "r2", "max_error"]

performance_targets:
  excellent_mae: 0.015
  good_mae: 0.025
  acceptable_mae: 0.040

dataloader:
  num_workers: 12
  prefetch_factor: 6
  persistent_workers: true
  pin_memory: true
