seed: 42
paths:
  data_root: ${DATA_ROOT:-/home/florianr/MG_Farm/0_Data/MGFarm_18650_FE}
  out_root: ${OUT_ROOT:-/home/florianr/MG_Farm/1_Scripts/DL_Models/LFP_SOH_Optimization_Study/1_training/0.3.1.6/outputs/soh}
model:
  type: GRU_Hybrid_Seq2Seq
  features:
  - Voltage[V]
  - Current[A]
  - "Temperature[\xB0C]"
  - EFC
  - Q_c
  embed_size: 192
  hidden_size: 224
  mlp_hidden: 288
  num_layers: 3
  res_blocks: 4
  bidirectional: false
  dropout: 0.2234067770419743
training:
  target: SOH
  seq_chunk_size: 168
  loss_mode: seq2seq
  warmup_steps: 8
  smooth_loss_weight: 0.005068587501408081
  smooth_loss_type: l2
  lr: 0.00028149474150708937
  weight_decay: 2.5967947824911006e-05
  max_grad_norm: 0.9185871549947837
  epochs: 60
  val_interval: 3
  early_stopping: 12
  batch_size: 128
  accum_steps: 1
  window_stride: 1
  scheduler:
    type: cosine_warm_restarts
    T_0: 150
    T_mult: 1
    eta_min_factor: 0.01
  compile: false
  warmup_epochs: 3
cells:
  train:
  - MGFarm_18650_C01
  - MGFarm_18650_C03
  - MGFarm_18650_C05
  - MGFarm_18650_C07
  - MGFarm_18650_C09
  - MGFarm_18650_C13
  - MGFarm_18650_C17
  - MGFarm_18650_C19
  - MGFarm_18650_C25
  - MGFarm_18650_C27
  val:
  - MGFarm_18650_C15
  - MGFarm_18650_C21
  test:
  - MGFarm_18650_C11
  - MGFarm_18650_C23
  - MGFarm_18650_C29
sampling:
  enabled: true
  interval_seconds: 3600
  feature_aggs:
  - mean
  - std
  - min
  - max
  target_agg: last
export:
  save_best_only: false
  save_every_n: 15
  to_onnx: true
  onnx_opset: 17
  stateful_onnx: true
tracking:
  csv_log: true
  csv_file: ${OUT_ROOT:-/home/florianr/MG_Farm/1_Scripts/DL_Models/LFP_SOH_Optimization_Study/1_training/0.3.1.6/outputs/soh}/training_log.csv
  tensorboard: false
  plot_interval: 10
metrics:
  primary: rmse
  secondary:
  - mae
  - r2
  - max_error
performance_targets:
  excellent_mae: 0.015
  good_mae: 0.025
  acceptable_mae: 0.04
dataloader:
  num_workers: 2
  prefetch_factor: 2
  persistent_workers: true
  pin_memory: true
study_variant:
  family: GRU
  role: larger_2
  tag: l2_h224
  source_model_dir: DL_Models/LFP_SOH_Optimization_Study/2_models/GRU/Base/0.3.1.2
