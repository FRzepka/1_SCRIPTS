model:
  features: ["Voltage[V]", "Current[A]", "Temperature[°C]", "SOH", "Q_c", "dU_dt[V/s]", "dI_dt[A/s]", "dt_s"]

training:
  seq_chunk_size: 2024
  val_interval: 1
  epochs: 20
  early_stopping: 5
  max_grad_norm: 1.0

hpt:
  n_trials: 16
  direction: minimize
  metric: val_rmse
  max_train_batches: 1500
  max_val_batches: 400

search_space:
  hidden_size: [64, 96, 128]
  mlp_hidden: [64, 96, 128]
  num_layers: [1, 2]
  dropout: [0.05, 0.08, 0.12]
  lr: [0.00008, 0.00010, 0.00012, 0.00015]
  weight_decay: [0.0, 0.00001, 0.0001]
  batch_size: [256, 512]
  accum_steps: [1, 2]
  dt_jitter_std_s: [0.01, 0.02, 0.03]
  current_channel_dropout_prob: [0.0, 0.03, 0.05, 0.08]
