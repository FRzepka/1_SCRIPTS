# 1.5.0.0 SOC training config (reproducible)
seed: 42

paths:
  data_root: /home/florianr/MG_Farm/0_Data/MGFarm_18650_FE
  out_root: /home/florianr/MG_Farm/1_Scripts/DL_Models/LFP_LSTM_MLP/1_training/1.5.0.0/outputs

model:
  type: LSTM_MLP
  features: ["Voltage[V]", "Current[A]", "Temperature[°C]", "Q_c", "dU_dt[V/s]", "dI_dt[A/s]"]  # SOH removed for 1.5.0.0
  hidden_size: 64
  mlp_hidden: 64
  num_layers: 1
  dropout: 0.05

training:
  seq_chunk_size: 2024
  lr: 0.00015
  weight_decay: 0.0001
  max_grad_norm: 1.0
  epochs: 120
  val_interval: 5
  early_stopping: 20
  batch_size: 512
  scheduler:
    type: cosine_warm_restarts
    T_0: 150
    eta_min_factor: 0.05

cells:
  train: ["MGFarm_18650_C01", "MGFarm_18650_C03", "MGFarm_18650_C05", "MGFarm_18650_C11", "MGFarm_18650_C17", "MGFarm_18650_C23"]
  val:   ["MGFarm_18650_C07", "MGFarm_18650_C19", "MGFarm_18650_C21"]

export:
  save_best_only: true
  save_every_n: 25
  to_onnx: true
  onnx_opset: 17
  stateful_onnx: true

tracking:
  csv_log: true
  csv_file: /home/florianr/MG_Farm/1_Scripts/DL_Models/LFP_LSTM_MLP/1_training/1.5.0.0/outputs/training_log.csv
  tensorboard: false

dataloader:
  num_workers: 12
  prefetch_factor: 6
  persistent_workers: true
  pin_memory: true
